version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

filters:
  phone_mask:
    "()": vicidial_vosk_cobranza_ivr.logging_utils.PhoneMaskingFilter
    enabled: true

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    filters: [phone_mask]
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: INFO
    formatter: standard
    filters: [phone_mask]
    filename: ./logs/vosk_cobranza.log
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  vicidial_vosk_cobranza_ivr:
    level: INFO
    handlers: [console, file]
    propagate: false

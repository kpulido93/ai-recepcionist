ivr:
  listen_seconds: 5
  sample_rate: 8000
  retry_attempts: 1
  default_intent: "DUDA"
  allow_dtmf_fallback: true
  early_detection_enabled: true
  early_detection_min_audio_ms: 250
  early_detection_min_chars: 2
  vad_enabled: true
  min_speech_ms: 250
  silence_after_speech_ms: 700
  listen:
    first_attempt:
      initial_timeout_seconds: 5.5
      max_listen_seconds: 6
      silence_after_speech_ms: 900
      min_speech_ms: 250
      early_detection_min_audio_ms: 250
    retry_attempt:
      initial_timeout_seconds: 4.5
      max_listen_seconds: 5
      silence_after_speech_ms: 700
      min_speech_ms: 250
      early_detection_min_audio_ms: 250
    objection_probe:
      initial_timeout_seconds: 1.8
      max_listen_seconds: 2
      silence_after_speech_ms: 550
      min_speech_ms: 250
      early_detection_min_audio_ms: 250
  # Umbral RMS simple para voz en 8 kHz/16-bit mono sin DSP pesado.
  rms_speech_threshold: 250.0
  max_dtmf_wait_ms: 5000
  dtmf_map:
    "1": "SI"
    "2": "NO"

audio:
  min_rms: 150.0

semantic_classifier:
  enabled: true
  fuzzy_enabled: true
  semantic_enabled: false
  fuzzy_threshold: 0.78
  semantic_threshold: 0.72
  min_confidence: 0.70
  intents_path: "semantic_intents.yml"

lead_context:
  csv_path: "lead_context.sample.csv"

prompts:
  personalized_greeting_enabled: true
  greeting_template: "Hola {client_name}, nos comunicamos de SokaCorp por una gestión pendiente relacionada con {bank_name}. ¿Desea que le comuniquemos ahora? Le escucho."
  greeting_template_without_name: "Hola, nos comunicamos de SokaCorp por una gestión pendiente relacionada con {bank_name}. ¿Desea que le comuniquemos ahora? Le escucho."
  greeting_fallback: "Hola, nos comunicamos de SokaCorp por una gestión pendiente. ¿Desea que le comuniquemos ahora? Le escucho."
  generated_audio_dir: "/var/lib/asterisk/sounds/custom/generated"
  generated_audio_playback_prefix: "custom/generated"
  default_greeting_audio: "custom/mensaje-cobranza"
  greeting_followup_audio: "custom/pregunta-abogado"
  bank_greeting_filename_template: "custom/gestion-{bank_slug}"
  bank_greeting_fallback_audio: ""
  sound_search_dirs:
    - "/var/lib/asterisk/sounds"
    - "/usr/share/asterisk/sounds"
  tts_provider: "espeak-ng"
  tts_voice: "es-la"
  cache_enabled: true

name_audio:
  enabled: true
  provider: "elevenlabs"
  cache_enabled: true
  cache_dir: "/var/lib/asterisk/sounds/custom/generated/names"
  mirror_dirs:
    - "/usr/share/asterisk/sounds/custom/generated/names"
  playback_prefix: "custom/generated/names"
  version: "v2-min-greeting"
  max_name_chars: 80
  fallback_on_error: true
  templates:
    male: "Señor {name},"
    female: "Señora {name},"
    unknown: "{name},"
  elevenlabs:
    api_key_env: "ELEVENLABS_API_KEY"
    voice_id_env: "ELEVENLABS_VOICE_ID"
    voice_id: "IoWn77TsmQnza94sYlfg"
    model_id: "eleven_multilingual_v2"
    output_format: "mp3_44100_128"
    timeout_seconds: 15

optima_audio:
  enabled: true
  provider: "elevenlabs"
  cache_enabled: true
  cache_dir: "/var/lib/asterisk/sounds/custom/generated/optima"
  mirror_dirs:
    - "/usr/share/asterisk/sounds/custom/generated/optima"
  playback_prefix: "custom/generated/optima"
  version: "v1-optima-segmented"
  env_file: null
  max_name_chars: 80
  max_bank_chars: 120
  fallback_on_error: true
  templates:
    saludo_nombre: "Saludos {name}."
    deuda_banco: "Por la deuda que mantiene en {bank}."
  fallbacks:
    saludo_generico_audio: "custom/optima-01-saludo-generico"
    deuda_generica_audio: "custom/optima-04-deuda-generica"

client_flow_audio:
  enabled: true
  provider: "elevenlabs"
  cache_enabled: true
  cache_dir: "/var/lib/asterisk/sounds/custom/generated/client-flow-9912"
  mirror_dirs:
    - "/usr/share/asterisk/sounds/custom/generated/client-flow-9912"
  playback_prefix: "custom/generated/client-flow-9912"
  version: "v2-client-flow-9912"
  trailing_silence_ms: 800
  fallback_on_error: true
  defaults:
    debtor: "Kevin"
    bank: "Banco de Prueba"
    gender: "male"
  prompts:
    greeting_templates:
      male: "Saludos. ¿Cómo está, señor {name}?"
      female: "Saludos. ¿Cómo está, señora {name}?"
      unknown: "Saludos. ¿Cómo está, {name}?"
    bank: "Le llamo con relación a la deuda que usted mantiene con el {bank}."
    debt_known: "Le estamos llamando por la deuda que tiene con {bank}, que usted ya conoce."
  elevenlabs:
    api_key_env: "ELEVENLABS_API_KEY"
    voice_id_env: "ELEVENLABS_VOICE_ID"
    voice_id: "IoWn77TsmQnza94sYlfg"
    model_id: "eleven_multilingual_v2"
    output_format: "mp3_44100_128"
    timeout_seconds: 15

asterisk:
  app_name: "vicidial-vosk-cobranza-ivr"
  channel_variable_name: "VOSK_INTENT"
  transfer_context: "REEMPLAZAR_CONTEXTO_TRANSFER"
  lawyer_destination_type: "ingroup"
  lawyer_destination: "REEMPLAZAR_INGROUP_O_EXTENSION"
  final_disposition_yes: "VOZ_SI_ABOGADO"
  final_disposition_no: "VOZ_NO_FINALIZA"
  final_disposition_unknown: "VOZ_NO_ENTENDIDO"

vosk:
  websocket_url: "ws://127.0.0.1:2700"
  # Compatibilidad con configuraciones previas; se normaliza desde ivr.sample_rate.
  sample_rate: 8000
  audio_format: "s16le"
  language: "es"
  websocket_timeout_seconds: 10

logging:
  enabled: true
  log_level: "INFO"
  log_path: "./logs/vosk_cobranza.log"
  events_path: "/var/log/asterisk/vosk_cobranza_events.jsonl"
  # Defaults de privacidad seguros para produccion.
  log_transcript: false
  mask_phone_numbers: true
  rotate_max_bytes: 10485760
  rotate_backup_count: 10

debug:
  audio_dump_enabled: false
  audio_dump_dir: "/tmp"
